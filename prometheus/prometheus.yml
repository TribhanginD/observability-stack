global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'incident-backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8000']
